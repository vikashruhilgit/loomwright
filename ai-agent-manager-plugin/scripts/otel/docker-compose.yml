# docker-compose.yml — Langfuse v3 self-host stack + OpenTelemetry Collector
#
# Follows the official Langfuse v3 docker-compose shape:
#   langfuse-web, langfuse-worker, postgres, clickhouse, redis, minio
# plus an otel-collector service that receives OTLP/HTTP on 4318 and forwards
# TRACES to Langfuse's public OTLP endpoint (see otel-collector-config.yaml).
#
# Why minio? Langfuse v3 REQUIRES S3-compatible blob storage for event and
# media uploads (a hard architectural requirement of v3, unlike v2). MinIO
# provides that locally without any cloud dependency.
#
# Why traces only? The Langfuse OTLP ingestion endpoint (/api/public/otel)
# accepts traces only — metrics and logs are not ingested by Langfuse, so the
# collector forwards traces and terminates metrics/logs in a debug exporter.
#
# Secrets: this file contains ONLY ${VAR} placeholders. All values resolve
# from an .env file generated by the /setup init flow at user runtime.
# Never commit a populated .env next to this file.
#
# Every image is pinned (no :latest, no floating major tags) and every
# service declares `restart: unless-stopped` + a `healthcheck`.

# Env shared by langfuse-web and langfuse-worker (official v3 layout).
x-langfuse-shared-env: &langfuse-shared-env
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  SALT: ${LANGFUSE_SALT}
  ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
  TELEMETRY_ENABLED: "false"
  CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
  CLICKHOUSE_URL: http://clickhouse:8123
  CLICKHOUSE_USER: ${CLICKHOUSE_USER}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET}
  LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET}
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_AUTH: ${REDIS_AUTH}

services:
  langfuse-web:
    image: langfuse/langfuse:3.82.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      <<: *langfuse-shared-env
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # Headless provisioning — org/project/user + API keypair created on first
      # boot so the /setup init flow never needs to click through the UI.
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  langfuse-worker:
    image: langfuse/langfuse-worker:3.82.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *langfuse-shared-env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3030/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  postgres:
    image: postgres:16.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8.6.70-alpine
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4.1-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_AUTH}", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_AUTH} --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      REDIS_AUTH: ${REDIS_AUTH}

  minio:
    # MinIO = local S3-compatible storage. Langfuse v3 requires S3 blob
    # storage for event/media uploads; MinIO satisfies that without cloud.
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    entrypoint: sh
    # Pre-create the bucket dir so Langfuse can write on first boot.
    command: -c 'mkdir -p /data/$${LANGFUSE_S3_BUCKET} && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_BUCKET: ${LANGFUSE_S3_BUCKET}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      # base64("pk-lf-...:sk-lf-...") — generated into .env by /setup init.
      LANGFUSE_BASIC_AUTH: ${LANGFUSE_BASIC_AUTH}
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      # Persistent sending_queue storage (file_storage extension) so spans
      # buffered while Langfuse is down survive a collector restart.
      - otel_collector_queue:/var/lib/otelcol
    ports:
      - "${OTEL_COLLECTOR_PORT:-4318}:4318"
    depends_on:
      langfuse-web:
        condition: service_healthy
    healthcheck:
      # The contrib image is distroless (no shell/wget/curl), so an HTTP probe
      # against the health_check extension is not possible from inside the
      # container. Running the collector binary with --version is the best
      # available in-container liveness proxy; external monitors can probe
      # the health_check extension on :13133 instead.
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
  otel_collector_queue:
