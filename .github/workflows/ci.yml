name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate version consistency
        run: bash scripts/validate-version.sh

      - name: Check command-wrapper sync (prevent canonical-prompt drift)
        run: bash scripts/check-command-sync.sh

      - name: Check documentation currency (version/count drift gate)
        run: bash scripts/check-doc-currency.sh

      - name: Eval harness self-test
        run: bash ai-agent-manager-plugin/scripts/test-run-eval.sh
