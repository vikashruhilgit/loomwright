name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            PROJECT CONTEXT:
            - This is a Claude Code plugin with 13 specialized agents and 50 skills
            - Agents live in ai-agent-manager-plugin/agents/, skills in ai-agent-manager-plugin/skills/
            - Key config files: .claude-plugin/marketplace.json, ai-agent-manager-plugin/.claude-plugin/plugin.json
            - No build step — this is a markdown/config plugin, not a compiled app

            Please review this pull request and provide feedback on:
            - Agent/skill prompt quality and clarity
            - Configuration correctness (plugin.json, marketplace.json)
            - Documentation accuracy
            - Potential issues or improvements

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          claude_args: '--model claude-opus-4-8 --effort high --allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
