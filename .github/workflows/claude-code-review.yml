name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Collapse rapid-fire pushes to the same PR into a single review of the latest
# state: a new run cancels any in-flight review for the same PR.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            PROJECT CONTEXT:
            - This is a Claude Code plugin made of specialized agents and skills — current counts are documented in CLAUDE.md
            - Agents live in loomwright/agents/, skills in loomwright/skills/
            - Key config files: .claude-plugin/marketplace.json, loomwright/.claude-plugin/plugin.json
            - No build step — this is a markdown/config plugin, not a compiled app

            Please review this pull request and provide feedback on:
            - Agent/skill prompt quality and clarity
            - Configuration correctness (plugin.json, marketplace.json)
            - Documentation accuracy
            - Potential issues or improvements

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Additionally, watch for these recurring behavioral/doc miss-classes (defined in loomwright/skills/quality-checklist/SKILL.md "Self-Heal Miss-Class Checklist") and call out any you see, mapping the signal to this repo's languages where relevant:
            - validation parity — a client/frontend-enforced rule with no equivalent server/API-boundary check
            - numeric falsy coercion — `||`/`!x`/truthiness on a numeric or boolean field where 0/false/"" is legitimate
            - positional args vs options object misuse — a call site whose argument shape doesn't match an options-object callee
            - missing branch coverage — a new if/else/switch/ternary/error path with no test exercising each branch
            - count/version/restated-list drift — a count, version, or restated list changed in one file but not the others that mirror it
            - cross-reference precision drift — a "see X" / file:line / canonical-name reference that no longer points where it claims

            This is your own independent checklist as a reviewer — apply your own judgment; do not try to match or converge with any other reviewer's findings.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          claude_args: '--model claude-opus-4-8 --effort high --allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
